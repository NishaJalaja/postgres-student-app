env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Deploy to Amazon ECS
on:
  workflow_call: 
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: kubernetes-test # Match your ECR name
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name my-eks-cluster --region eu-north-1

      - name: Deploy to EKS
        run: |
          ls -R k8s/
          kubectl delete job my-python-app --ignore-not-found
          kubectl apply -f $GITHUB_WORKSPACE/k8s/job.yml
