name: Deploy to Amazon ECS
on:
  workflow_call: 
    inputs:
      target_repo:
        required: true
        type: string
    secrets:
        GH_PAT:
          required: true
  #push:
    #branches: [ "main" ]

jobs:
  deploy:
    runs-on: eks-runner-set
    permissions:
      id-token: write  # This is the "magic" line for OIDC
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: NishaJalaja/postgres-student-app
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          clean: true
     
      - name: Debug OIDC Claims
        run: |
          # This prints the raw token info (masked) to the logs
          echo "AUD: sts.amazonaws.com"
          echo "Repo: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796174528069:role/GitHubActionRunnerRole 
          aws-region: eu-north-1

      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: kubernetes-test # Match your ECR name
          IMAGE_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "FULL_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV
      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name my-eks-cluster --region eu-north-1

      - name: Deploy to EKS
        run: |
          ls -R k8s/
          kubectl delete job my-python-app --ignore-not-found
          export FULL_IMAGE_NAME="$FULL_IMAGE"
          echo "Using Image: $FULL_IMAGE_NAME"
          envsubst < $GITHUB_WORKSPACE/k8s/job.yml | kubectl apply -f -
