name: Python PostgreSQL CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # This spins up a real Postgres instance for your tests!
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: bhagavathi1
          POSTGRES_USER: dbadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary pytest

    - name: Run Tests
      env:
        DB_HOST: localhost
        DB_NAME: test
        DB_USER: dbadmin
        DB_PASS: bhagavathi1
      run: |
        # This is where you would call your python script or pytest
        python studentinsert.py